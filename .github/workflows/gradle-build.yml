name: 构建 Gradle 项目

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码（包含子模块）
      - name: 检出源代码
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      # 2. 安装 Nix 包管理器
      - name: 安装 Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # 3. 启用必要的 Nix 实验特性
      - name: 配置 Nix
        run: |
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

      # 4. 安装项目自定义构建依赖（如果有）
      - name: 安装依赖项
        uses: ./.github/actions/build-deps

      # 5. 设置 Java 8 环境（Gradle 构建需要）
      - name: 设置 Java 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      # 6. 修复 Gradle Wrapper 权限
      - name: 赋予 gradlew 执行权限
        run: chmod +x java/gradlew

      # 7. 执行构建
      - name: 运行 Gradle 构建
        run: |
          cd java
          nix develop --command ./gradlew build --stacktrace --info

      # 8. 上传构建产物（jar 文件）
      - name: 上传 JAR 文件
        uses: actions/upload-artifact@v4
        with:
          name: nether-pathfinder-artifact
          path: java/build/libs/*.jar